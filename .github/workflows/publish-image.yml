name: Publish container image

# Build and push the image when a GitHub Release is published (i.e. a tag is
# released). Also runnable by hand from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Resolves to e.g. ghcr.io/dandrzejewski/meshconfig (must be lowercase — the
  # repo path already is).
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout
      packages: write       # push to GHCR
      id-token: write       # OIDC for build provenance
      attestations: write   # attach build attestation to the package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner build the arm64 image too (Raspberry Pi etc.).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags/labels from the release tag: full semver, major.minor, and
      # `latest` for the newest non-prerelease.
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — speeds up repeat builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cryptographic, verifiable record of what built this image and from where.
      - name: Attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
