services:
  meshconfig:
    build:
      context: .
      dockerfile: Containerfile
    image: meshconfig:latest

    ports:
      - "127.0.0.1:8420:8080"

    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"

    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    mem_limit: 128m
    pids_limit: 64

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - meshconfig

networks:
  meshconfig:
    driver: bridge
